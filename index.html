<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapital — Wall Street Analiz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f2eb; color: #1a1a16; margin: 0; padding: 20px; }
        .card { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .api-section { background: #0a0a08; color: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        input { width: calc(100% - 130px); padding: 12px; border: 1px solid #333; background: #222; color: #gold; border-radius: 4px; }
        button { padding: 12px 20px; background: #c9a84c; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #output { line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap; }
        .error-box { background: #fee; color: #c23b22; padding: 15px; border-radius: 4px; border: 1px solid #c23b22; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="font-family: serif; border-bottom: 2px solid #0a0a08; padding-bottom: 10px;">Kapital <span style="color:#c9a84c">Analiz</span></h1>
        
        <div class="api-section">
            <p style="margin: 0 0 10px 0; font-size: 0.8rem; color: #c9a84c;">GOOGLE AI STUDIO API ANAHTARI</p>
            <input type="password" id="keyInput" placeholder="AIzaSy...">
            <button onclick="calistir()">Analiz Et</button>
        </div>

        <div id="output">
            <p style="color: #888;">Lütfen API anahtarınızı girip "Analiz Et" butonuna basın...</p>
        </div>
    </div>

    <script>
        async function calistir() {
            const key = document.getElementById('keyInput').value.trim();
            const out = document.getElementById('output');

            if(!key) { alert("Anahtar girmedin!"); return; }
            out.innerHTML = "<b>Piyasalar analiz ediliyor, lütfen bekleyin...</b>";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Sen bir finans uzmanısın. Bugünün ekonomi gündemini (Borsa, Altın, Döviz) profesyonelce yorumla. Türkçe yaz." }] }] })
                });

                const data = await response.json();

                // Hata Kontrolü (Reading '0' hatasını engelleyen kısım)
                if (data.candidates && data.candidates.length > 0) {
                    out.innerHTML = data.candidates[0].content.parts[0].text;
                } else if (data.error) {
                    out.innerHTML = `<div class="error-box"><b>API Hatası:</b> ${data.error.message}<br><small>Anahtarın yanlış olabilir veya henüz onaylanmamış olabilir.</small></div>`;
                } else {
                    out.innerHTML = `<div class="error-box">Yapay zekadan boş cevap geldi. Lütfen API anahtarını Google AI Studio'dan tekrar alıp dene.</div>`;
                }

            } catch (e) {
                out.innerHTML = `<div class="error-box">Bağlantı hatası oluştu: ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
