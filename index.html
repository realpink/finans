<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kapital — Finans Analiz</title>
    <style>
        body { font-family: sans-serif; background: #f5f2eb; padding: 20px; }
        .card { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .api-box { background: #0a0a08; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input { width: 70%; padding: 10px; border-radius: 4px; border: none; }
        button { padding: 10px 20px; background: #c9a84c; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #output { line-height: 1.6; white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="border-bottom: 2px solid #0a0a08;">Kapital <span style="color:#c9a84c">Analiz</span></h1>
        <div class="api-box">
            <input type="password" id="keyInput" placeholder="API Anahtarını Girin">
            <button onclick="calistir()">Analiz Et</button>
        </div>
        <div id="output">Lütfen analiz için butona basın.</div>
    </div>

    <script>
        async function calistir() {
            const key = document.getElementById('keyInput').value.trim();
            const out = document.getElementById('output');
            if(!key) return alert("Anahtar eksik!");
            
            out.innerHTML = "<b>Gemini analiz yapıyor...</b>";

            try {
                // Modeli 'gemini-1.5-flash' olarak güncelledik
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Bugünkü borsa ve ekonomi hakkında Türkçe kısa bir yorum yap." }] }] })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0]) {
                    out.innerHTML = data.candidates[0].content.parts[0].text;
                } else {
                    out.innerHTML = "Hata: " + (data.error ? data.error.message : "Cevap alınamadı.");
                }
            } catch (e) {
                out.innerHTML = "Bağlantı hatası: " + e.message;
            }
        }
    </script>
</body>
</html>
