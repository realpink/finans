<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kapital — Wall Street Analiz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f2eb; color: #1a1a16; margin: 0; padding: 20px; }
        .card { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .api-section { background: #0a0a08; color: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        input { width: calc(100% - 130px); padding: 12px; border: 1px solid #333; background: #222; color: white; border-radius: 4px; }
        button { padding: 12px 20px; background: #c9a84c; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #output { line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap; }
        .status { font-size: 0.9rem; color: #c9a84c; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="font-family: serif; border-bottom: 2px solid #0a0a08; padding-bottom: 10px;">Kapital <span style="color:#c9a84c">Analiz</span></h1>
        
        <div class="api-section">
            <p style="margin: 0 0 10px 0; font-size: 0.8rem; color: #c9a84c;">GOOGLE AI STUDIO API ANAHTARI</p>
            <input type="password" id="keyInput" placeholder="AIzaSy...">
            <button onclick="calistir()">Analiz Et</button>
            <div id="status" class="status"></div>
        </div>

        <div id="output">
            <p style="color: #888;">Anahtarı girip "Analiz Et" butonuna bastığında Wall Street raporun burada görünecek.</p>
        </div>
    </div>

    <script>
        async function calistir() {
            const key = document.getElementById('keyInput').value.trim();
            const out = document.getElementById('output');
            const status = document.getElementById('status');

            if(!key) { alert("Lütfen anahtarı gir!"); return; }
            
            status.innerHTML = "Veriler işleniyor...";
            out.innerHTML = "<b>Gemini 1.5 Flash piyasaları analiz ediyor, lütfen bekleyin...</b>";

            try {
                // v1 endpoint ve tam model ismi kullanımı
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: "Sen profesyonel bir Wall Street analistisin. Bugünkü borsa, altın ve döviz piyasası hakkında Türkçe, etkileyici ve kısa bir analiz yaz."
                            }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0]) {
                    out.innerHTML = data.candidates[0].content.parts[0].text;
                    status.innerHTML = "✓ Analiz Tamamlandı";
                } else {
                    // Hata mesajını daha anlaşılır hale getirdik
                    const msg = data.error ? data.error.message : "Bilinmeyen bir hata oluştu.";
                    out.innerHTML = `<div style="color:red; border:1px solid red; padding:10px;"><b>Hata oluştu:</b><br>${msg}</div>`;
                    status.innerHTML = "⚠ Hata";
